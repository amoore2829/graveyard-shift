<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GRAVEYARD SHIFT — section</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=VT323&family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/gs.css?v=dev">
</head>
<body>
<div class="page">
<div class="panel">

<div id="gs-shell"><div class="boot-warning">This page did not finish loading. Try a hard refresh — <b>Ctrl+Shift+R</b> (or Cmd+Shift+R on a Mac).</div></div>

<div class="content">
<div class="page-title" id="cat-title">…</div>
<div class="page-sub" id="cat-sub"></div>
<div class="subtabs hidden" id="subtabs"></div>

<div class="controls hidden" id="controls">
<label for="f-type">SHOW</label>
<select id="f-type">
<option value="">everything</option>
<option value="review">reviews only</option>
<option value="pick">picks only</option>
<option value="art">art only</option>
<option value="post">writing only</option>
</select>
<label for="f-sort">SORT</label>
<select id="f-sort">
<option value="newest">newest first</option>
<option value="oldest">oldest first</option>
<option value="rating">highest rated</option>
<option value="title">by title</option>
</select>
</div>

<div class="result-count hidden" id="count"></div>
<div id="cat-posts"></div>
<div id="cat-empty"></div>
</div>

<div id="gs-footer"></div>

</div>
</div>

<script src="content/site.js?v=dev"></script>
<script src="content/posts.js?v=dev"></script>
<script src="assets/gs.js?v=dev"></script>
<script>
(function () {
  "use strict";
  var params = new URLSearchParams(location.search);
  var cat = (params.get("cat") || "").toLowerCase();
  var sub = (params.get("sub") || "").toLowerCase();
  var meta = GS.CATS[cat] || { title: "LOST SECTION", sub: "this wing of the graveyard doesn't exist… yet" };
  var subs = GS.subsFor(cat);
  if (sub && !(subs && subs[sub])) sub = "";           /* unknown sub → whole section */
  var subMeta = sub && subs ? subs[sub] : null;

  GS.boot({ here: cat, marquee: "browsing the " + (subMeta || meta).title.toLowerCase() +
                                " wing — mind the loose flagstones" });

  document.title = "GRAVEYARD SHIFT — " + (subMeta || meta).title.toLowerCase();
  document.getElementById("cat-title").textContent = "◆ " + (subMeta || meta).title + " ◆";
  document.getElementById("cat-sub").textContent = (subMeta || meta).sub;

  /* subcategory tabs, when the section splits */
  if (subs) {
    var tabs = document.getElementById("subtabs");
    var mkTab = function (key, label) {
      var href = "category.html?cat=" + encodeURIComponent(cat) +
                 (key ? "&sub=" + encodeURIComponent(key) : "");
      var a = GS.link(href, label, "subtab" + (sub === key ? " here" : ""));
      var n = GS.byCat(cat, key).length;
      if (n) a.appendChild(GS.el("span", "subtab-n", " " + n));
      return a;
    };
    tabs.appendChild(mkTab("", "all"));
    Object.keys(subs).forEach(function (k) {
      tabs.appendChild(mkTab(k, subs[k].title.toLowerCase()));
    });
    tabs.classList.remove("hidden");
  }

  var all = GS.byCat(cat, sub);
  var isGallery = cat === "art";
  var list = document.getElementById("cat-posts");
  var countEl = document.getElementById("count");

  if (!all.length) {
    document.getElementById("cat-empty").appendChild(GS.emptyState(
      isGallery ? "NOTHING HANGING ON THESE WALLS YET" : "NOTHING BURIED UNDER THIS STONE YET",
      isGallery
        ? "The gallery is empty. Drop an image into assets/art/ and add it from the control panel."
        : GS.CATS[cat]
          ? "The keeper is still digging. Write the first " + cat + " entry from the control panel."
          : "No such section. Try the nav above."));
    return;
  }

  document.getElementById("controls").classList.remove("hidden");
  countEl.classList.remove("hidden");

  var fType = document.getElementById("f-type");
  var fSort = document.getElementById("f-sort");

  function rating(p) {
    return (p.work && Number(p.work.rating)) || 0;
  }

  function render() {
    var shown = all.filter(function (p) {
      return !fType.value || (p.type || "post") === fType.value;
    });

    var mode = fSort.value;
    shown = shown.slice().sort(function (a, b) {
      if (mode === "oldest") return a.date < b.date ? -1 : 1;
      if (mode === "title")  return a.title.localeCompare(b.title);
      if (mode === "rating") return rating(b) - rating(a);
      return a.date < b.date ? 1 : -1;
    });

    list.textContent = "";
    var noun = isGallery ? (shown.length === 1 ? " piece" : " pieces")
                         : (shown.length === 1 ? " tale"  : " tales");
    countEl.textContent = shown.length + noun;
    if (!shown.length) {
      list.appendChild(GS.el("div", "gb-empty", "nothing matches that filter."));
      return;
    }

    /* the art wing hangs its pieces instead of listing them */
    if (isGallery) {
      list.className = "gallery";
      shown.forEach(function (p) {
        list.appendChild(p.image ? GS.artTile(p) : GS.card(p));
      });
      return;
    }
    list.className = "card-list";
    shown.forEach(function (p) { list.appendChild(GS.card(p)); });
  }

  fType.addEventListener("change", render);
  fSort.addEventListener("change", render);
  render();
})();
</script>
</body>
</html>
