name: Deploy the graveyard

# Publishes the public site to GitHub Pages.
#
# The keeper's control panel (admin.html + assets/admin-core.js) is tracked
# in this repo so it stays versioned and backed up, but it is stripped out
# below so it is never served publicly. It is a local authoring tool.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish rather than cancelling it mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble the public site
        run: |
          set -euo pipefail
          mkdir -p _site
          # Build from git rather than the working tree: only committed files can
          # ship, and there's no way to recurse into the destination.
          git archive HEAD | tar -x -C _site

          # keeper-only tools — authoring happens locally, never on the live site
          rm -f _site/admin.html
          rm -f _site/assets/admin-core.js

          # not part of the site
          rm -rf "_site/Campy Horror Blog Design"
          rm -rf _site/.github
          rm -f _site/.gitignore _site/.gitattributes

      - name: Fail if any keeper file slipped through
        run: |
          set -euo pipefail
          fail=0
          for f in admin.html assets/admin-core.js; do
            if [ -e "_site/$f" ]; then
              echo "::error::$f is present in the deploy artifact"
              fail=1
            fi
          done
          # the site is broken if these are missing, so catch it before it ships
          for f in index.html assets/gs.js assets/gs.css content/posts.js content/site.js .nojekyll; do
            if [ ! -e "_site/$f" ]; then
              echo "::error::$f is MISSING from the deploy artifact"
              fail=1
            fi
          done
          echo "Publishing:"
          find _site -type f | sort
          exit $fail

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
