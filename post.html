<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GRAVEYARD SHIFT — a tale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=VT323&family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/gs.css">
</head>
<body>
<div class="page">
<div class="panel">

<div id="gs-shell"></div>
<div class="content narrow" id="content"></div>
<div id="gs-footer"></div>

</div>
</div>

<script src="content/site.js"></script>
<script src="content/posts.js"></script>
<script src="assets/gs.js"></script>
<script>
(function () {
  "use strict";
  var id = new URLSearchParams(location.search).get("id");
  var post = GS.byId(id);
  var cat = post ? String(post.cat || "").toLowerCase() : "";

  GS.boot({
    here: cat,
    marquee: "you are reading a tale from the GRAVEYARD SHIFT archive — do not read alone — " +
             "the keeper accepts no responsibility for what follows you home"
  });

  var c = document.getElementById("content");

  /* ---- not found ---- */
  if (!post) {
    var lost = GS.el("div", "lost");
    lost.appendChild(GS.el("div", "big", "THIS TALE WAS NEVER BURIED"));
    var note = GS.el("div", "note", "Either the keeper un-buried it, or it never existed. Spooky. ");
    note.appendChild(GS.link("index.html", "← flee to the homepage"));
    lost.appendChild(note);
    c.appendChild(lost);
    return;
  }

  document.title = "GRAVEYARD SHIFT — " + post.title;

  if (post.draft) {
    var d = GS.el("div", "preview-bar", "⚠ DRAFT — this post is hidden from the public site.");
    d.style.marginBottom = "14px";
    c.appendChild(d);
  }

  /* ---- title + meta ---- */
  var t = GS.el("div", "post-title", post.title.toUpperCase());
  var m = GS.el("div", "post-meta");
  m.textContent = "by the keeper · " + GS.fmtDate(post.date) + " · filed under ";
  m.appendChild(GS.link("category.html?cat=" + encodeURIComponent(cat), post.cat));
  c.appendChild(t);
  c.appendChild(m);

  /* ---- review header block ---- */
  if (post.type === "review" && post.work) {
    var w = post.work;
    var box = GS.el("div", "workbox");
    box.appendChild(GS.thumb(post, "workbox-thumb"));

    var info = GS.el("div");
    info.style.flex = "1";
    info.appendChild(GS.el("div", "workbox-label", "THE KEEPER'S VERDICT"));
    info.appendChild(GS.el("div", "workbox-name", post.title));

    var credit = [w.creator, w.year].filter(Boolean).join(" · ");
    if (credit) info.appendChild(GS.el("div", "workbox-creator", credit));

    if (w.rating) {
      var r = GS.el("div", "workbox-rating");
      r.appendChild(GS.stars(w.rating));
      info.appendChild(r);
    }
    if (w.verdict) info.appendChild(GS.el("div", "workbox-verdict", "“" + w.verdict + "”"));

    box.appendChild(info);
    c.appendChild(box);
  }

  /* ---- creepypasta credit block ---- */
  if (post.type === "pick" && post.source) {
    var s = GS.el("div", "sourcebox");
    s.appendChild(GS.el("span", "l", "NOT MY STORY"));
    s.appendChild(document.createTextNode(
      "Originally written by " + (post.source.author || "an unknown author") + ". "));
    var url = GS.safeUrl(post.source.url);
    if (url) {
      var a = GS.link(url, "read the original →");
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      s.appendChild(a);
    }
    c.appendChild(s);
  }

  /* ---- body ---- */
  c.appendChild(GS.paragraphs(post.body, GS.el("div", "post-body")));

  /* ---- prev / next within the whole archive ---- */
  var all = GS.posts();
  var i = -1;
  all.forEach(function (p, n) { if (String(p.id) === String(post.id)) i = n; });

  var back = GS.el("div", "backrow");
  var left = GS.el("div");
  var right = GS.el("div");
  right.style.textAlign = "right";

  if (i > 0) left.appendChild(GS.link("post.html?id=" + encodeURIComponent(all[i - 1].id), "← " + all[i - 1].title));
  else left.appendChild(GS.link("index.html", "← back to the graveyard"));

  if (i > -1 && i < all.length - 1) right.appendChild(GS.link("post.html?id=" + encodeURIComponent(all[i + 1].id), all[i + 1].title + " →"));
  else right.appendChild(GS.link("category.html?cat=" + encodeURIComponent(cat), "more " + post.cat + " →"));

  back.appendChild(left);
  back.appendChild(right);
  c.appendChild(back);
})();
</script>
</body>
</html>
